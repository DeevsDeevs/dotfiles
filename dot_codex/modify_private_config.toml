{{- /* chezmoi:modify-template */ -}}
{{- $data := dict -}}
{{- if ne (trim .chezmoi.stdin) "" -}}
{{- $data = fromToml .chezmoi.stdin -}}
{{- end -}}

{{- /* Top-level settings. */ -}}
{{- $data = set $data "sandbox_mode" "workspace-write" -}}
{{- $data = set $data "web_search" "live" -}}
{{- $data = set $data "model" "gpt-5.5" -}}
{{- $data = set $data "personality" "pragmatic" -}}
{{- $data = set $data "model_reasoning_effort" "high" -}}
{{- $data = set $data "tool_output_token_limit" 25000 -}}
{{- $data = set $data "model_auto_compact_token_limit" 233000 -}}
{{- $data = set $data "suppress_unstable_features_warning" true -}}

{{- /* MCP settings. */ -}}
{{- $mcpServers := get $data "mcp_servers" | default (dict) -}}
{{- $context7ApiKey := output "sh" "-c" "if command -v op >/dev/null 2>&1; then op read --no-newline 'op://JustEnvs/context7-api-key/credential' </dev/null 2>/dev/null || true; fi" -}}
{{- $context7 := dict "url" "https://mcp.context7.com/mcp" "http_headers" (dict "CONTEXT7_API_KEY" $context7ApiKey) "enabled" true -}}
{{- $_ := unset $mcpServers "datadog" -}}
{{- $mcpServers = set $mcpServers "context7" $context7 -}}
{{- $data = set $data "mcp_servers" $mcpServers -}}

{{- /* Sandbox settings. */ -}}
{{- $sandbox := get $data "sandbox_workspace_write" | default (dict) -}}
{{- $sandbox = set $sandbox "network_access" true -}}
{{- /* Keep extra writable roots empty. Codex treats legacy writable_roots as
      runtime workspace_roots on every turn; adding Nix/devbox/cache trees here
      makes turn startup very slow. Use `codex --add-dir ...` or a one-off
      profile only when a session genuinely needs extra writable paths. */ -}}
{{- $sandbox = set $sandbox "writable_roots" (list) -}}

{{- $data = set $data "sandbox_workspace_write" $sandbox -}}

{{- /* Profiles. */ -}}
{{- $profiles := get $data "profiles" | default (dict) -}}
{{- $profiles = set $profiles "auto" (dict "approval_policy" "never") -}}
{{- $profiles = set $profiles "review" (dict "approval_policy" "on-request") -}}
{{- $data = set $data "profiles" $profiles -}}

{{- /* Features. */ -}}
{{- $existingFeatures := get $data "features" | default (dict) -}}
{{- $features := dict -}}
{{- range $k, $v := $existingFeatures -}}
  {{- if ne $k "collab" -}}
    {{- $features = set $features $k $v -}}
  {{- end -}}
{{- end -}}
{{- $features = set $features "unified_exec" true -}}
{{- $features = set $features "apply_patch_freeform" true -}}
{{- $features = set $features "shell_snapshot" true -}}
{{- $features = set $features "child_agents_md" true -}}
{{- $features = set $features "multi_agent" true -}}
{{- $data = set $data "features" $features -}}

{{- $data | toToml -}}
